# .coderabbit.yaml: interpark-clone 백엔드 리뷰 설정
language: ko-KR

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  profile: assertive

  tools:
    guidelines:
      - "Spring Boot, Java 21, JPA 기반 백엔드 프로젝트 기준으로 리뷰한다."
      - "클래스명은 PascalCase, 메서드명과 변수명은 camelCase, 상수와 enum 값은 UPPER_SNAKE_CASE를 사용한다."
      - "엔티티는 JPA 기본 생성자를 제공하고 외부 생성을 제한할 필요가 있으면 protected 접근 제어자를 사용한다."
      - "JPA 연관관계는 기본적으로 FetchType.LAZY를 사용하고, 불필요한 양방향 매핑과 Cascade 사용을 피한다."
      - "엔티티에는 setter를 열어두지 않고 생성자, 정적 팩토리, 도메인 메서드로 상태 변경 의도를 드러낸다."
      - "금액, 수량, 좌석, 예매 상태처럼 정합성이 중요한 값은 null 가능성, 음수, 상태 전이를 검토한다."
      - "예매, 좌석 선점, 결제 흐름은 트랜잭션 경계와 동시성 충돌 가능성을 중점적으로 리뷰한다."
      - "동시성 제어가 필요한 로직은 낙관적 락, 비관적 락, 분산 락, 멱등성 처리 필요 여부를 확인한다."
      - "외부 결제 콜백이나 재시도 가능한 요청은 중복 처리에 안전한지 확인한다."
      - "API 응답은 공통 Response, SuccessCode, GeneralErrorCode, BusinessErrorCode 구조를 일관되게 사용한다."
      - "예외는 GlobalExceptionHandler에서 처리 가능한 커스텀 예외나 Spring MVC 예외 흐름으로 연결한다."
      - "검증은 컨트롤러 DTO에서 Bean Validation으로 처리하고, 서비스에서는 비즈니스 규칙을 명확히 검증한다."
      - "Repository 조회는 N+1 문제, 불필요한 전체 조회, 인덱스가 필요한 조건을 함께 검토한다."
      - "비밀번호, 토큰, 결제 식별자 같은 민감 정보는 로그나 응답에 노출하지 않는다."
      - "테스트는 변경된 비즈니스 규칙, 예외 케이스, 트랜잭션 경계, 동시성 위험이 있는 로직을 우선 검증한다."
      - "불필요한 리팩터링, 포맷 변경, 도메인과 무관한 변경이 PR에 섞이지 않았는지 확인한다."

chat:
  auto_reply: true
